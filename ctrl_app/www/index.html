<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
<meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <link rel="stylesheet" href="css/index.css">
    <title>CtrlApp</title>
</head>
<body>

    <!-- ── Searching state ───────────────────────────────────────────────── -->
    <div id="screen-searching" class="screen active">
        <div class="pulse-ring"></div>
        <p class="status-label">Searching for<br><span class="service-name">AudioAppWS</span></p>
        <p class="status-sub">Scanning local network…</p>
    </div>

    <!-- ── Found / connecting state ──────────────────────────────────────── -->
    <div id="screen-found" class="screen">
        <div class="spinner"></div>
        <p class="status-label">Found service</p>
        <p id="found-addr" class="status-sub"></p>
        <p class="status-sub">Connecting…</p>
    </div>

    <!-- ── Connected / chat state ────────────────────────────────────────── -->
    <div id="screen-connected" class="screen">
        <div id="chat-header">
            <span id="conn-addr"></span>
            <button id="btn-disconnect">Disconnect</button>
        </div>
        <div id="log"></div>
        <div id="input-row">
            <textarea id="msg-input" rows="1" placeholder="Type a message…"></textarea>
            <button id="btn-send">Send</button>
        </div>
    </div>

    <!-- ── Error state ────────────────────────────────────────────────────── -->
    <div id="screen-error" class="screen">
        <p class="status-label error-text">Error</p>
        <p id="error-detail" class="status-sub"></p>
        <button id="btn-retry">Retry</button>
    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
