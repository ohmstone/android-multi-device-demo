<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover, user-scalable=no">
    <link rel="stylesheet" href="css/index.css">
    <title>CtrlApp</title>
</head>
<body>

    <!-- Hidden: raw camera frame drawn here for OpenCV processing -->
    <video id="video" autoplay playsinline muted></video>
    <canvas id="feed-canvas"></canvas>

    <!-- ── Searching state ───────────────────────────────────────────────── -->
    <div id="screen-searching" class="screen active">
        <div class="pulse-ring"></div>
        <p class="status-label">Searching for<br><span class="service-name">AudioAppWS</span></p>
        <p class="status-sub">Scanning local network…</p>
    </div>

    <!-- ── Found / connecting state ──────────────────────────────────────── -->
    <div id="screen-found" class="screen">
        <div class="spinner"></div>
        <p class="status-label">Found service</p>
        <p id="found-addr" class="status-sub"></p>
        <p class="status-sub">Connecting…</p>
    </div>

    <!-- ── Connected state ───────────────────────────────────────────────── -->
    <div id="screen-connected" class="screen">

        <!-- Row 1: camera previews side by side -->
        <div id="camera-row">
            <canvas id="raw-canvas"></canvas>
            <canvas id="warp-canvas"></canvas>
        </div>

        <!-- Row 2: dot visualization (angle driven by camera detection) -->
        <div id="canvas-wrap">
            <canvas id="input-canvas"></canvas>
        </div>

        <!-- Row 3: controls + readouts -->
        <div id="controls-panel">
            <div id="buttons">
                <button id="mirror-btn">Mirror: OFF</button>
                <button id="calibrate-btn">Calibrate</button>
                <button id="focus-btn" style="display:none">Focus: Auto</button>
            </div>
            <div id="focus-row" style="display:none">
                <label id="focus-label">Focus</label>
                <input id="focus-slider" type="range" step="any">
            </div>
            <div id="value-row">
                <div id="panel-label">encoder value</div>
                <div id="panel-value">
                    <span id="indicator"></span>
                    <span id="value-display">0</span>
                    <span id="delta-display"></span>
                </div>
            </div>
            <span id="status">Waiting for camera…</span>
        </div>
    </div>

    <!-- ── Error state ────────────────────────────────────────────────────── -->
    <div id="screen-error" class="screen">
        <p class="status-label error-text">Error</p>
        <p id="error-detail" class="status-sub"></p>
        <button id="btn-retry">Retry</button>
    </div>

    <script>
        // Resolved once cv.onRuntimeInitialized fires; awaited before any cv call.
        window.cvReady = new Promise(resolve => {
            window.onOpenCvReady = () => { cv.onRuntimeInitialized = resolve }
        })
    </script>
    <script src="cordova.js"></script>
    <script async src="js/opencv_4.14.js" onload="onOpenCvReady();" type="text/javascript"></script>
    <script type="module" src="js/index.js"></script>
</body>
</html>
